<!DOCTYPE html>
<html lang="no">
<head><meta charset="UTF-8"><title>Admin login</title><link rel="stylesheet" href="style.css"></head>
<body>
<header class="topbar"><div class="logo">IT-hjelp Oslo</div><nav><a href="/">Forside</a></nav></header>
<main class="login-page">
<section class="login-card">
<h1>Admin login</h1>
<p>Logg inn for å se kunder.</p>
<form id="loginForm">
<label>Brukernavn</label><input type="text" id="username" required>
<label>Passord</label><input type="password" id="password" required>
<button type="submit">Logg inn</button>
<p id="loginMessage"></p>
</form>
</section>
</main>
<script src="login.js"></script>
</body>
</html>
